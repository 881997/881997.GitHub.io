name: Keep Alive

on:
  schedule:
    # 每个月的 1 号和 15 号午夜 0 点触发（UTC 时间）
    - cron: '0 0 1,15 * *'
  workflow_dispatch: # 允许你手动触发测试

jobs:
  keep-alive:
    runs-on: ubuntu-latest
    permissions:
      contents: write # 必须赋予写入权限，机器人才能提交代码
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Ping Repository
        run: |
          echo "Last keep alive: $(date)" > keep_alive.txt
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add keep_alive.txt
          # 如果文件没有变化，git commit 会报错，用 || exit 0 确保工作流不会失败
          git commit -m "chore: automated keep-alive" || exit 0
          git push
